name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "FEAT: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to go-kiro-gateway!
        Before submitting, please check [existing issues](https://github.com/chasedputnam/go-kiro-gateway/issues) to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use case are you trying to enable?
      placeholder: "Example: I'm trying to use go-kiro-gateway with X tool but it doesn't support Y..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
      placeholder: "Example: Add support for X by doing Y..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
      placeholder: "Example: I tried using X but it doesn't work because..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the gateway does this relate to?
      options:
        - Authentication / credentials
        - OpenAI-compatible API
        - Anthropic-compatible API
        - Streaming / SSE
        - Tool calling
        - Docker / deployment
        - VPN / proxy support
        - Model support
        - Logging / debugging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or references that would help.
    validations:
      required: false
